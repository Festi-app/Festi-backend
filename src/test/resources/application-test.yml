spring:
  datasource:
    url: jdbc:h2:mem:festi;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false

festi:
  jwt:
    secret: test-secret-for-common-configuration-only
    access-token-expiration: 3600
